services:
  - type: web
    name: swello-backend
    runtime: python
    region: frankfurt
    repo: https://github.com/abimmost/swello-backend.git
    branch: main
    autoDeployTrigger: "off"
    plan: free
    buildCommand: "python -m pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
